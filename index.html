<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思考の席</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family:
          'Hiragino Sans',
          'Yu Gothic',
          system-ui,
          -apple-system,
          sans-serif;
      }
      #field {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
      }
      #hint {
        position: fixed;
        top: 24px;
        left: 0;
        right: 0;
        text-align: center;
        color: rgba(180, 200, 230, 0.45);
        font-size: 13px;
        letter-spacing: 0.08em;
        pointer-events: none;
        transition: opacity 1.6s ease;
      }
      #hint.faded {
        opacity: 0;
      }
      #bar {
        position: fixed;
        bottom: 6vh;
        left: 50%;
        transform: translateX(-50%);
        width: min(560px, 84vw);
      }
      #thought-input {
        width: 100%;
        padding: 14px 20px;
        background: rgba(20, 26, 40, 0.55);
        border: 1px solid rgba(140, 170, 210, 0.22);
        border-radius: 999px;
        color: #e8eef8;
        font-size: 15px;
        outline: none;
        backdrop-filter: blur(6px);
        transition:
          border-color 0.4s ease,
          background 0.4s ease;
      }
      #thought-input::placeholder {
        color: rgba(180, 200, 230, 0.35);
      }
      #thought-input:focus {
        border-color: rgba(150, 200, 255, 0.5);
        background: rgba(24, 32, 50, 0.7);
      }
      #about {
        position: fixed;
        bottom: 18px;
        left: 18px;
        max-width: min(360px, 78vw);
        color: rgba(180, 200, 230, 0.55);
        font-size: 12px;
        line-height: 1.7;
        letter-spacing: 0.04em;
      }
      #about summary {
        cursor: pointer;
        list-style: none;
        color: rgba(180, 200, 230, 0.5);
        padding: 4px 0;
        transition: color 0.3s ease;
      }
      #about summary::-webkit-details-marker {
        display: none;
      }
      #about summary::before {
        content: '＋ ';
      }
      #about[open] summary::before {
        content: '− ';
      }
      #about summary:hover,
      #about[open] summary {
        color: rgba(190, 215, 245, 0.85);
      }
      #about .body {
        margin-top: 6px;
        padding: 12px 16px;
        background: rgba(20, 26, 40, 0.5);
        border: 1px solid rgba(140, 170, 210, 0.18);
        border-radius: 12px;
        backdrop-filter: blur(6px);
      }
      #about .body p + p {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <canvas
      id="field"
      tabindex="0"
      role="img"
      aria-label="思考の生態系。言葉を入力すると生き物が生まれ、クリックで水やりできる。"
      aria-describedby="hint"
    ></canvas>
    <p id="hint">
      言葉を打つと生き物になる。クリックで水やり。放っておくと枯れる。何も保存されない。
    </p>
    <div id="bar">
      <input
        id="thought-input"
        type="text"
        autocomplete="off"
        maxlength="80"
        aria-label="思考を入力（Enter で生まれる。最大 80 文字）"
        placeholder="いま考えていることを置いてみる…"
      />
    </div>
    <details id="about">
      <summary>これは何？</summary>
      <div class="body">
        <p>
          頭に浮かんだ言葉を「生き物」として育てる体験です。実用ツールではなく、考えたことの生態系を眺めて触る作品。
        </p>
        <p>
          言葉を打つと画面を漂う生き物になり、放っておくと枯れ、クリックで水やりすると息を吹き返す。近い思考どうしは線でつながります。
        </p>
        <p>
          リロードするとすべて消えます。これは仕様で、思考は記録せずその場で生まれて消えていく、というのがこの作品の核です。
        </p>
      </div>
    </details>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
