<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思考の席</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family:
          'Hiragino Sans',
          'Yu Gothic',
          system-ui,
          -apple-system,
          sans-serif;
      }
      #field {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
      }
      #hint {
        position: fixed;
        top: 24px;
        left: 0;
        right: 0;
        text-align: center;
        color: rgba(180, 200, 230, 0.45);
        font-size: 13px;
        letter-spacing: 0.08em;
        pointer-events: none;
        transition: opacity 1.6s ease;
      }
      #hint.faded {
        opacity: 0;
      }
      #bar {
        position: fixed;
        bottom: 6vh;
        left: 50%;
        transform: translateX(-50%);
        width: min(560px, 84vw);
      }
      #thought-input {
        width: 100%;
        padding: 14px 20px;
        background: rgba(20, 26, 40, 0.55);
        border: 1px solid rgba(140, 170, 210, 0.22);
        border-radius: 999px;
        color: #e8eef8;
        font-size: 15px;
        outline: none;
        backdrop-filter: blur(6px);
        transition:
          border-color 0.4s ease,
          background 0.4s ease;
      }
      #thought-input::placeholder {
        color: rgba(180, 200, 230, 0.35);
      }
      #thought-input:focus {
        border-color: rgba(150, 200, 255, 0.5);
        background: rgba(24, 32, 50, 0.7);
      }
    </style>
  </head>
  <body>
    <canvas
      id="field"
      tabindex="0"
      role="img"
      aria-label="思考の生態系。言葉を入力すると生き物が生まれ、クリックで水やりできる。"
      aria-describedby="hint"
    ></canvas>
    <p id="hint">
      言葉を打つと生き物になる。クリックで水やり。放っておくと枯れる。何も保存されない。
    </p>
    <div id="bar">
      <input
        id="thought-input"
        type="text"
        autocomplete="off"
        maxlength="80"
        aria-label="思考を入力（Enter で生まれる。最大 80 文字）"
        placeholder="いま考えていることを置いてみる…"
      />
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
