name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 PR/ブランチで新しい push があれば古い実行をキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck / lint / format / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm を先に用意してから setup-node を実行する。
      # 順序を逆にすると setup-node の `cache: pnpm` 解決時に
      # pnpm が PATH に無く失敗しうるため。packageManager から版を解決。
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
