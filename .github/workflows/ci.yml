name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 PR/ブランチで新しい push があれば古い実行をキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck / lint / depcruise / format / test / build
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: pdfreview
      DB_PASSWORD: pdfreview
      DB_NAME: pdfreview
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pdfreview
          POSTGRES_PASSWORD: pdfreview
          POSTGRES_DB: pdfreview
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pdfreview"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # pnpm を先に用意してから setup-node を実行する。
      # 順序を逆にすると setup-node の `cache: pnpm` 解決時に
      # pnpm が PATH に無く失敗しうるため。packageManager から版を解決。
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Depcruise
        run: pnpm depcruise

      - name: Format check
        run: pnpm format:check

      - name: DB migrate
        run: pnpm --filter @pdf-review/server db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
